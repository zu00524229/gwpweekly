name = "gwpweekly"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── 部署步驟 ──────────────────────────────────
# 1. npm install
# 2. npx wrangler login
# 3. npx wrangler kv:namespace create GWP_WEEKLY
#    → 把輸出的 id 貼到下方 [[kv_namespaces]] id = "..."
# 4. npx wrangler deploy
# ─────────────────────────────────────────────

[[kv_namespaces]]
binding = "GWP_WEEKLY"
id = "YOUR_KV_NAMESPACE_ID"

[triggers]
crons = ["0 0 * * 1"]
